# Example run config. Copy and edit for your own experiments.
#
# Paths are resolved relative to the directory you run the CLI from
# (typically the repository root).

[run]
name = "example"
pack = "promptpacks/example_minimal"
# conditions = ["neutral_explainer"]   # optional subset; defaults to all pack conditions
repeats = 2
shuffle_seed = 20260704                # seeded shuffle of (condition x repeat) run order
output_dir = "runs"

[model]
adapter = "mock"        # "mock" runs offline; switch to "ollama" for real runs
name = "mock-small"     # for ollama, e.g. "llama3.2:1b"

[model.params]
temperature = 0.7
top_p = 0.9
num_ctx = 4096
num_predict = 900
seed = 11               # generation seed passed to the backend
