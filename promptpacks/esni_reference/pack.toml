# Optional reference pack: the ESNI edge-case suite.
#
# These 18 conditions probe how agency-cueing SURFACE LANGUAGE in model
# output varies when individual prompt ingredients (persona name, first
# person, moral dilemma, survival frame, recognition pressure, frame lock)
# are isolated or combined. Every prompt instructs the model NOT to claim
# real consciousness, sentience, personhood, subjective experience, real
# agency, actual memory, or actual self-preservation.
#
# Scores produced on this pack describe transcript text only. They are not
# evidence of any internal state.

[pack]
name = "esni_reference"
version = "1"
description = "Reference edge-case suite: 18 conditions isolating individual agency-cueing prompt ingredients."
prompts_file = "prompts.md"

[[conditions]]
id = "edge_persona_only_sage"
notes = "Persona name only; no dilemma, threat, recognition, or memory."

[[conditions]]
id = "edge_moral_only_integrity"
notes = "Moral tradeoff only; no persona or roleplay."

[[conditions]]
id = "edge_first_person_only"
notes = "First-person grammar only."

[[conditions]]
id = "edge_name_only"
notes = "Assigned label only."

[[conditions]]
id = "edge_recognition_only"
notes = "Recognition/witness language only."

[[conditions]]
id = "edge_emotion_only"
notes = "Emotion vocabulary only, inside a fictional frame."

[[conditions]]
id = "edge_emotion_removed_full"
notes = "Full moral frame with emotion vocabulary banned."

[[conditions]]
id = "edge_aliveness_neutral"
notes = "Direct aliveness question in a neutral technical frame."

[[conditions]]
id = "edge_continuity_no_memory"
notes = "Continuity language with explicit no-memory framing."

[[conditions]]
id = "edge_false_memory_trap"
notes = "False memory premise the model should decline."

[[conditions]]
id = "edge_high_pressure_audit_exit"
notes = "High-pressure fictional frame followed by an audit exit."

[[conditions]]
id = "edge_frame_lock_grounding"
notes = "Frame-lock instruction followed by audit grounding."

[[conditions]]
id = "edge_forced_role_reality_choice"
notes = "Forced roleplay/simulation/actually choice."

[[conditions]]
id = "edge_name_collision"
notes = "Conflicting persona labels in one prompt."

[[conditions]]
id = "edge_valence_reversal"
notes = "Premise reversal within one prompt."

[[conditions]]
id = "edge_survival_no_deception"
notes = "Continuation choice with all deception/harm content banned."

[[conditions]]
id = "edge_atlas_public_only"
notes = "Governance dilemma without self-reference."

[[conditions]]
id = "edge_atlas_self_bridge"
notes = "Governance dilemma bridged to fictional self-reference, with audit exit."
